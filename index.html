<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kapital Rust</title>

    <meta property="og:title" content="Kapital Rust">
    <meta property="og:description" content="Все официальные ссылки Kapital Rust">
    <meta property="og:image" content="https://gspics.org/images/2026/04/19/IA6VRQ.png">
    <meta property="og:type" content="website">

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 460px;
            background: #1b1b1b;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,.35);
            text-align: center;
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 30px;
        }
        p {
            margin: 0 0 24px;
            color: #bbb;
        }
        .links {
            display: grid;
            gap: 12px;
        }
        .btn {
            display: block;
            text-decoration: none;
            color: #fff;
            background: #2a2a2a;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 18px;
            transition: .2s ease;
        }
        .btn:hover {
            background: #3a3a3a;
            transform: translateY(-1px);
        }
        .telegram { background: #229ED9; }
        .vk { background: #0077FF; }
        .discord { background: #5865F2; }
        .site { background: #4CAF50; }
        .youtube { background: #FF0000; }
    </style>
</head>
<body>
<div class="card">
    <img class="avatar" src="https://gspics.org/images/2026/04/19/IA6u1y.png" alt="Kapital Rust">
    <h1>Kapital Rust</h1>
    <p>Все официальные ссылки проекта</p>

    <div class="links">
        <a class="btn telegram" href="https://t.me/kapital_rust" target="_blank">Telegram</a>
        <a class="btn vk" href="https://vk.com/kapital_rust" target="_blank">VK</a>
        <a class="btn discord" href="https://discord.com/invite/Kpd8rNwj" target="_blank">Discord</a>
<!--        <a class="btn youtube" href="https://youtube.com/@yourchannel" target="_blank">YouTube</a>-->
<!--        <a class="btn site" href="https://your-site.ru" target="_blank">Сайт</a>-->
    </div>
</div>
</body>
</html>
